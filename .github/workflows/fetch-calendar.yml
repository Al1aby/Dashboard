name: Fetch Calendar + Radar + Tides

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests icalendar python-dateutil

      - name: Fetch calendar
        run: python fetch_calendar.py

      - name: Fetch radar
        run: python fetch_radar.py

      - name: Fetch tides
        run: python fetch_tides.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json radar.gif tides.json
          git diff --cached --quiet || git commit -m "chore: update data [skip ci]"
          git push
