name: Fetch iCloud Calendar

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests icalendar python-dateutil

      - name: Fetch calendar and write events.json
        run: python fetch_calendar.py

      - name: Fetch radar image
        run: |
          curl -L \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64)" \
            -H "Referer: https://weather.gc.ca/" \
            "https://weather.gc.ca/data/radar/temp_image/XSM/XSM_PRECIPET_RAIN_3.gif" \
            --output radar.gif
          echo "Radar size: $(wc -c < radar.gif) bytes"

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json radar.gif
          git diff --cached --quiet || git commit -m "chore: update data [skip ci]"
          git push
