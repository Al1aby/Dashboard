<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Karla:wght@300;400;500&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
<script>const UNITS = "C";</script>
<style>
:root {
  --bg:     #0c0f14;
  --panel:  #111620;
  --border: #1e2740;
  --accent: #f0c060;
  --teal:   #5ecfcf;
  --text:   #dde6f0;
  --muted:  #4a607a;
  --dim:    #1e2a3a;
  --red:    #d07070;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100vw; height:100vh; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Karla',sans-serif; }

/* ── ROOT GRID: 3 columns, full height ── */
.root {
  display: grid;
  width: 100%; height: 100%;
  grid-template-columns: 320px 1fr 300px;
  grid-template-rows: 1fr;
  padding: 3.5vw 4vw;
  gap: 0;
}

/* ══════════════════════════════════════
   LEFT — compact clock + today's events
   ══════════════════════════════════════ */
#left {
  display: flex; flex-direction: column;
  padding-right: 36px;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

/* Clock block — compact */
#clock-block {
  flex-shrink: 0;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
#time {
  font-family: 'Playfair Display', serif;
  font-size: 72px; line-height: 1;
  color: var(--accent); letter-spacing: -2px;
  text-shadow: 0 0 40px rgba(240,192,96,.2);
}
#ampm {
  font-family: 'Inconsolata', monospace;
  font-size: 13px; color: var(--muted);
  letter-spacing: 5px; margin-top: -2px;
}
#date-line {
  font-family: 'Playfair Display', serif;
  font-size: 17px; color: var(--text); margin-top: 4px;
}
#date-sub {
  font-family: 'Inconsolata', monospace;
  font-size: 11px; color: var(--muted);
  letter-spacing: 3px; margin-top: 1px;
}

/* Today's events */
#today-hdr {
  font-family: 'Inconsolata', monospace;
  font-size: 10px; letter-spacing: 3px; color: var(--muted);
  margin-bottom: 10px; flex-shrink: 0;
}
#today-events {
  flex: 1; display: flex; flex-direction: column;
  gap: 5px; overflow: hidden;
}

.tev {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px; border-radius: 4px;
  background: var(--panel); border-left: 3px solid var(--teal);
  flex-shrink: 0; overflow: hidden;
}
.tev.allday { border-left-color: var(--dim); background: transparent; padding-left: 8px; }
.tev.past   { border-left-color: var(--muted); opacity: 0.5; }
.tev.now    { border-left-color: var(--accent); background: rgba(240,192,96,.07); }

.tev-time {
  font-family: 'Inconsolata', monospace;
  font-size: 11px; color: var(--muted);
  white-space: nowrap; min-width: 56px; flex-shrink: 0;
}
.tev.now .tev-time { color: var(--accent); }

.tev-title {
  font-size: 14px; color: var(--text); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tev-loc {
  font-family: 'Inconsolata', monospace;
  font-size: 10px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 2; max-width: 120px;
}
.no-tev {
  font-family: 'Inconsolata', monospace;
  font-size: 12px; color: var(--dim); letter-spacing: 1px;
  padding: 4px 0;
}

/* ══════════════════════════════════════
   CENTER — next 6 days
   ══════════════════════════════════════ */
#center {
  display: flex; flex-direction: column;
  padding: 0 36px; overflow: hidden;
}
#agenda-hdr {
  display: flex; align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px; flex-shrink: 0;
}
#agenda-title {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-style: italic; color: var(--text);
}
#cal-badge {
  font-family: 'Inconsolata', monospace;
  font-size: 10px; letter-spacing: 2px; color: var(--teal);
}
#agenda-days {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.agenda-day {
  display: grid; grid-template-columns: 88px 1fr;
  align-items: start;
  padding: 9px 0; border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.agenda-day:last-child { border-bottom: 1px solid var(--border); }
.day-name {
  font-family: 'Inconsolata', monospace;
  font-size: 10px; letter-spacing: 3px; color: var(--muted);
}
.day-num {
  font-family: 'Playfair Display', serif;
  font-size: 30px; line-height: 1.1; color: var(--text);
}
.day-events { display: flex; flex-direction: column; gap: 4px; padding-top: 2px; }
.ev {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 12px; border-radius: 4px;
  background: var(--panel); border-left: 3px solid var(--teal);
  overflow: hidden;
}
.ev.allday { border-left-color: var(--dim); background: transparent; padding-left: 8px; }
.ev-time {
  font-family: 'Inconsolata', monospace;
  font-size: 11px; color: var(--muted);
  white-space: nowrap; min-width: 54px; flex-shrink: 0;
}
.ev-title {
  font-size: 14px; color: var(--text); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ev-loc {
  font-family: 'Inconsolata', monospace;
  font-size: 10px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 2; max-width: 140px;
}
.no-ev {
  font-family: 'Inconsolata', monospace;
  font-size: 11px; color: var(--dim); letter-spacing: 1px;
}

/* ══════════════════════════════════════
   RIGHT — current weather + 7-day forecast
   ══════════════════════════════════════ */
#right {
  display: flex; flex-direction: column;
  padding-left: 32px;
  border-left: 1px solid var(--border);
  gap: 0; overflow: hidden;
}

/* Current weather */
#wx-now {
  flex-shrink: 0;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
#wx-hero { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
#wx-icon { font-size: 44px; line-height: 1; }
#wx-temp {
  font-family: 'Playfair Display', serif;
  font-size: 56px; line-height: 1;
  color: var(--text); letter-spacing: -2px;
}
#wx-desc {
  font-family: 'Inconsolata', monospace;
  font-size: 12px; color: var(--teal); letter-spacing: 3px;
}
#wx-feels {
  font-family: 'Inconsolata', monospace;
  font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 3px;
}
#wx-loc {
  font-family: 'Inconsolata', monospace;
  font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px;
}
.wx-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 5px; margin-top: 10px;
}
.wx-cell { background: var(--dim); border-radius: 5px; padding: 7px 10px; }
.wx-lbl {
  font-family: 'Inconsolata', monospace;
  font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: 1px;
}
.wx-val { font-size: 16px; font-weight: 500; color: var(--text); }

/* 7-day forecast */
#fc-title {
  font-family: 'Inconsolata', monospace;
  font-size: 10px; letter-spacing: 4px; color: var(--muted);
  margin-bottom: 10px; flex-shrink: 0;
}
#fc-list { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.fc-row {
  display: grid; grid-template-columns: 48px 28px 1fr 38px 46px;
  align-items: center; gap: 7px;
  padding: 7px 0; border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.fc-row:last-child { border-bottom: 1px solid var(--border); }
.fc-day { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; }
.fc-icon { font-size: 18px; text-align: center; }
.fc-bg { background: var(--dim); border-radius: 3px; height: 3px; position: relative; }
.fc-fg { position: absolute; height: 3px; border-radius: 3px; background: linear-gradient(90deg, var(--teal), var(--accent)); }
.fc-lo { font-family: 'Inconsolata', monospace; font-size: 12px; color: var(--muted); text-align: right; }
.fc-hi { font-family: 'Inconsolata', monospace; font-size: 13px; color: var(--text); font-weight: 500; text-align: right; }

/* ── LOADER ── */
#loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; z-index:99; transition:opacity .7s;
}
#loader.gone { opacity:0; pointer-events:none; }
.lhead { font-family:'Playfair Display',serif; font-size:28px; color:var(--accent); font-style:italic; }
.lsub  { font-family:'Inconsolata',monospace; font-size:11px; color:var(--muted); letter-spacing:4px; }
.ltrack { width:180px; height:1px; background:var(--border); }
.lfill  { height:1px; background:var(--accent); width:0; transition:width .4s; }
</style>
</head>
<body>

<div id="loader">
  <div class="lhead">One moment</div>
  <div class="ltrack"><div class="lfill" id="lfill"></div></div>
  <div class="lsub" id="lsub">STARTING</div>
</div>

<div class="root">

  <!-- LEFT: clock + today's hourly events -->
  <div id="left">
    <div id="clock-block">
      <div id="time">12:00</div>
      <div id="ampm">AM</div>
      <div id="date-line">Monday, January 1</div>
      <div id="date-sub">2025</div>
    </div>
    <div id="today-hdr">TODAY'S EVENTS</div>
    <div id="today-events">
      <div class="no-tev">Loading…</div>
    </div>
  </div>

  <!-- CENTER: next 6 days -->
  <div id="center">
    <div id="agenda-hdr">
      <div id="agenda-title">Coming Up</div>
      <div id="cal-badge">● LOADING</div>
    </div>
    <div id="agenda-days"></div>
  </div>

  <!-- RIGHT: current weather + forecast -->
  <div id="right">
    <div id="wx-now">
      <div id="wx-hero">
        <div id="wx-icon">⏳</div>
        <div id="wx-temp">--°</div>
      </div>
      <div id="wx-desc">LOADING WEATHER</div>
      <div id="wx-feels">FEELS LIKE --°</div>
      <div id="wx-loc">📍 Nauwigewauk, NB</div>
      <div class="wx-grid">
        <div class="wx-cell"><div class="wx-lbl">HUMIDITY</div><div class="wx-val" id="ws-h">--%</div></div>
        <div class="wx-cell"><div class="wx-lbl">WIND</div><div class="wx-val" id="ws-w">--</div></div>
        <div class="wx-cell"><div class="wx-lbl">UV INDEX</div><div class="wx-val" id="ws-u">--</div></div>
        <div class="wx-cell"><div class="wx-lbl">PRECIP.</div><div class="wx-val" id="ws-p">--</div></div>
      </div>
    </div>
    <div id="fc-title">7-DAY FORECAST</div>
    <div id="fc-list"><div style="color:var(--muted);font-family:'Inconsolata',monospace;font-size:11px">Loading…</div></div>
  </div>

</div>

<script>
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DSH    = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function fetchWithTimeout(url, ms) {
  return new Promise((res, rej) => {
    const t = setTimeout(() => rej(new Error('Timeout')), ms);
    fetch(url, { cache: 'no-store' })
      .then(r  => { clearTimeout(t); res(r); })
      .catch(e => { clearTimeout(t); rej(e); });
  });
}

let useF = (typeof UNITS !== 'undefined' && UNITS === 'F');
let wxData = null;

// ── Loader ─────────────────────────────────────────────────────
function load(p, m) {
  document.getElementById('lfill').style.width = p + '%';
  document.getElementById('lsub').textContent = m;
}
function doneLoading() {
  const el = document.getElementById('loader');
  el.classList.add('gone');
  setTimeout(() => el.remove(), 800);
}

// ── Clock ──────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  const h = n.getHours(), m = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('time').textContent      = `${String(h%12||12).padStart(2,'0')}:${m}`;
  document.getElementById('ampm').textContent      = h >= 12 ? 'PM' : 'AM';
  document.getElementById('date-line').textContent = `${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}`;
  document.getElementById('date-sub').textContent  = String(n.getFullYear());
}
setInterval(tick, 1000); tick();

// ── Helpers ────────────────────────────────────────────────────
function toDateStr(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function parseTime12(str) {
  // "9:30 AM" → minutes since midnight
  if (!str || str === 'All day') return -1;
  const m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return -1;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  if (m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
  if (m[3].toUpperCase() === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

// ── Calendar fetch ─────────────────────────────────────────────
let allCalEvents = [];

async function fetchCalendar() {
  try {
    const res = await fetchWithTimeout('./events.json', 8000);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allCalEvents = data.events || [];
    buildToday(allCalEvents);
    buildAgenda(allCalEvents);

    const badge = document.getElementById('cal-badge');
    if (data.error && !allCalEvents.length) {
      badge.textContent = '⚠ CAL ERROR'; badge.style.color = 'var(--red)';
    } else {
      badge.textContent = `● ${allCalEvents.length} EVENT${allCalEvents.length !== 1 ? 'S' : ''}`;
      badge.style.color = 'var(--teal)';
    }
  } catch(e) {
    document.getElementById('cal-badge').textContent = '● OFFLINE';
    document.getElementById('cal-badge').style.color = 'var(--red)';
    buildToday([]); buildAgenda([]);
  }
}

// ── Today's hourly events (left column) ───────────────────────
function buildToday(events) {
  const wrap = document.getElementById('today-events');
  wrap.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  const ds = toDateStr(today);
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();

  const todayEvs = events
    .filter(ev => ev.date === ds)
    .sort((a, b) => {
      if (a.all_day && !b.all_day) return -1;
      if (!a.all_day && b.all_day) return 1;
      return parseTime12(a.time) - parseTime12(b.time);
    });

  if (!todayEvs.length) {
    wrap.innerHTML = '<div class="no-tev">— No events today</div>';
    return;
  }

  todayEvs.forEach(ev => {
    const evMin = parseTime12(ev.time);
    let cls = 'tev' + (ev.all_day ? ' allday' : '');
    if (!ev.all_day) {
      if (evMin < nowMin - 60) cls += ' past';
      else if (evMin <= nowMin + 30) cls += ' now';
    }
    const p = document.createElement('div');
    p.className = cls;
    p.innerHTML = `<div class="tev-time">${ev.all_day ? 'All day' : ev.time}</div><div class="tev-title">${ev.title}</div>${ev.location ? `<div class="tev-loc">📍 ${ev.location}</div>` : ''}`;
    wrap.appendChild(p);
  });
}

// ── Next 6 days agenda (center column) ────────────────────────
function buildAgenda(events) {
  const wrap = document.getElementById('agenda-days');
  wrap.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);

  const byDate = {};
  events.forEach(ev => { (byDate[ev.date] = byDate[ev.date] || []).push(ev); });

  // Start from tomorrow (i=1), show 6 days
  for (let i = 1; i <= 6; i++) {
    const day = new Date(today); day.setDate(today.getDate() + i);
    const ds  = toDateStr(day);
    const evs = (byDate[ds] || []).sort((a,b) => {
      if (a.all_day && !b.all_day) return -1;
      if (!a.all_day && b.all_day) return 1;
      return parseTime12(a.time) - parseTime12(b.time);
    });

    const row = document.createElement('div'); row.className = 'agenda-day';
    const lbl = document.createElement('div'); lbl.className = 'day-label';
    lbl.innerHTML = `<div class="day-name">${DSH[day.getDay()]}</div><div class="day-num">${day.getDate()}</div>`;

    const col = document.createElement('div'); col.className = 'day-events';
    if (!evs.length) {
      col.innerHTML = '<div class="no-ev">— No events</div>';
    } else {
      evs.slice(0, 3).forEach(ev => {
        const p = document.createElement('div');
        p.className = 'ev' + (ev.all_day ? ' allday' : '');
        p.innerHTML = `<div class="ev-time">${ev.all_day ? 'All day' : ev.time}</div><div class="ev-title">${ev.title}</div>${ev.location ? `<div class="ev-loc">📍 ${ev.location}</div>` : ''}`;
        col.appendChild(p);
      });
      if (evs.length > 3) {
        const m = document.createElement('div');
        m.className = 'no-ev'; m.textContent = `+${evs.length - 3} more`;
        col.appendChild(m);
      }
    }
    row.appendChild(lbl); row.appendChild(col); wrap.appendChild(row);
  }
}

// ── Weather ────────────────────────────────────────────────────
const WMO = {
  0:['☀️','CLEAR'],1:['🌤','MOSTLY CLEAR'],2:['⛅','PARTLY CLOUDY'],3:['☁️','OVERCAST'],
  45:['🌫','FOG'],48:['🌫','FOG'],51:['🌦','DRIZZLE'],53:['🌦','DRIZZLE'],55:['🌧','DRIZZLE'],
  61:['🌧','LIGHT RAIN'],63:['🌧','RAIN'],65:['🌧','HEAVY RAIN'],
  71:['🌨','LIGHT SNOW'],73:['❄️','SNOW'],75:['❄️','HEAVY SNOW'],
  80:['🌦','SHOWERS'],81:['🌧','SHOWERS'],82:['⛈','HEAVY SHOWERS'],
  95:['⛈','THUNDERSTORM'],96:['⛈','THUNDERSTORM'],99:['⛈','THUNDERSTORM'],
};
const wmo  = c => WMO[c] || ['🌡','UNKNOWN'];
const cToF = c => Math.round(c * 9/5 + 32);
const fmt  = c => useF ? `${cToF(c)}°F` : `${Math.round(c)}°C`;
const fmtS = c => useF ? `${cToF(c)}°`  : `${Math.round(c)}°`;

function renderWx(d) {
  wxData = d;
  const cur = d.current, daily = d.daily;
  const [icon, desc] = wmo(cur.weather_code);
  document.getElementById('wx-icon').textContent  = icon;
  document.getElementById('wx-temp').textContent  = fmt(cur.temperature_2m);
  document.getElementById('wx-desc').textContent  = desc;
  document.getElementById('wx-feels').textContent = `FEELS LIKE ${fmt(cur.apparent_temperature)}`;
  document.getElementById('ws-h').textContent     = `${Math.round(cur.relative_humidity_2m)}%`;
  document.getElementById('ws-w').textContent     = `${Math.round(cur.wind_speed_10m)} km/h`;
  document.getElementById('ws-u').textContent     = daily.uv_index_max?.[0]?.toFixed(1) ?? '--';
  document.getElementById('ws-p').textContent     = `${(cur.precipitation||0).toFixed(1)} mm`;

  const list = document.getElementById('fc-list'); list.innerHTML = '';
  const gMin = Math.min(...daily.temperature_2m_min);
  const gMax = Math.max(...daily.temperature_2m_max);
  const rng  = gMax - gMin || 1;

  daily.time.slice(0,7).forEach((ds, i) => {
    const d2 = new Date(ds + 'T12:00:00');
    const lo = daily.temperature_2m_min[i], hi = daily.temperature_2m_max[i];
    const [fi] = wmo(daily.weather_code?.[i] ?? 0);
    const bL = (lo-gMin)/rng*100, bW = (hi-lo)/rng*100;
    const lbl = i===0 ? 'TODAY' : i===1 ? 'TMRW' : DSH[d2.getDay()];
    const row = document.createElement('div'); row.className = 'fc-row';
    row.innerHTML = `<div class="fc-day">${lbl}</div><div class="fc-icon">${fi}</div><div class="fc-bg"><div class="fc-fg" style="left:${bL}%;width:${bW}%"></div></div><div class="fc-lo">${fmtS(lo)}</div><div class="fc-hi">${fmtS(hi)}</div>`;
    list.appendChild(row);
  });
}

async function fetchWx() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=45.4724&longitude=-65.8945&timezone=auto&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,precipitation&daily=temperature_2m_min,temperature_2m_max,weather_code,uv_index_max&forecast_days=7&wind_speed_unit=kmh';
    renderWx(await (await fetch(url)).json());
  } catch { document.getElementById('wx-desc').textContent = 'WEATHER UNAVAILABLE'; }
}

// ── Init ───────────────────────────────────────────────────────
async function init() {
  load(40, 'FETCHING WEATHER');
  await fetchWx();
  load(75, 'LOADING CALENDAR');
  await fetchCalendar();
  load(100, 'READY');
  setTimeout(doneLoading, 300);
  setInterval(fetchCalendar, 5 * 60 * 1000);
  setInterval(fetchWx,       10 * 60 * 1000);
  // Rebuild today's events every minute so past/now highlighting stays current
  setInterval(() => buildToday(allCalEvents), 60 * 1000);
}

init();
</script>
</body>
</html>
